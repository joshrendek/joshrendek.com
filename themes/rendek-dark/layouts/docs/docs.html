{{ partial "header.html" . }}


<div class="grid-x grid-padding-x">
  <div class="cell large-9 large-offset-0 small-12 medium-9 article-container">
    <h2 class="content-list-title">
      <a href="{{ .RelPermalink }}" class="linktopost">{{ .Title }}</a>
    </h2>

    <div class="content-list">
      {{ range .Pages }}
      {{ .Render "li"}}
      {{ end }}
    </div>
  </div>
</div>


{{ partial "footer.html" . }}
