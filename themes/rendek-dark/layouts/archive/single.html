{{ partial "header.html" . }}
<h1 class="list-title">{{ .Title }}</h1>
<div class="content-list">
  {{ range (where .Site.RegularPages "Type" "post").GroupByDate "2006" }}
  <h2 class="year">{{ .Key }}</h2>
  {{ range .Pages }}{{ .Render "li" }}{{ end }}
  {{ end }}
</div>
{{ partial "footer.html" . }}
