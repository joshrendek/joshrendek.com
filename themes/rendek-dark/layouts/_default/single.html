{{ partial "header.html" . }}
<article class="post">
  <header>
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="date">{{ .Date.Format "Jan 2, 2006" }} &middot; {{ .ReadingTime }} min</p>
  </header>
  <div class="content">{{ .Content }}</div>
  {{ partial "postfooter.html" . }}
</article>
{{ partial "footer.html" . }}
